<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail.tm Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="sidebar">

<h2> Mail.tm Pro</h2>

<div class="loginBox">

<input
id="email"
type="email"
placeholder="Email Mail.tm">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<hr>

<div class="toolbar">

<button onclick="loadInbox()">
 Inbox
</button>

<button onclick="refreshInbox()">
 Refresh
</button>

</div>

<input
id="search"
type="text"
placeholder="Cari email..."
onkeyup="searchMail()">

<div id="mailList"></div>

</div>

<div class="content">

<div id="welcome">

<h1> Mail.tm Pro</h1>

<p>Pilih email di sebelah kiri.</p>

</div>

<div id="viewer" style="display:none;">

<h2 id="subject"></h2>

<p id="from"></p>

<div class="otpBox">

<span id="otp">
------
</span>

<button onclick="copyOTP()">
 Copy OTP
</button>

</div>

<div id="body"></div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
